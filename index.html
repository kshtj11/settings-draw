<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Settings Drawer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Sora', sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  .device-frame {
    position: relative;
    width: 540px;
    height: 620px;
    overflow: hidden;
    background: #000;
  }

  /* Home screen */
  .home-screen {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .home-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Bottom dock bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 540px;
    height: 149px;
    z-index: 2;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
    pointer-events: none;
  }

  .bottom-bar.visible {
    transform: translateY(0);
    pointer-events: auto;
  }

  /* Settings drawer */
  .settings-drawer {
    position: absolute;
    inset: 0;
    z-index: 3;
    background: #000;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .settings-drawer.visible {
    transform: translateY(0);
  }


  /* ---- Settings drawer internals ---- */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: absolute;
    width: 500px;
    height: 32px;
    left: calc(50% - 250px);
    top: 24px;
  }

  .time {
    font-family: 'Sora', sans-serif;
    font-weight: 400;
    font-size: 20px;
    line-height: 130%;
    color: #D2D2D2;
  }

  .settings-icon {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .settings-icon svg { width: 22px; height: 22px; fill: #D2D2D2; }

  .content-scroll {
    position: absolute;
    top: 76px;
    left: 22px;
    width: 492px;
    bottom: 48px;
    overflow-y: scroll;
    overflow-x: hidden;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }
  .content-scroll::-webkit-scrollbar { display: none; }

  .content-page {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 20px;
    width: 492px;
    height: 100%;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    justify-content: flex-start;
  }

  .row-small {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    width: 492px;
    height: 52px;
  }

  .tile-small {
    width: 68px;
    height: 52px;
    background: #151515;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tile-small:active { background: #222; }
  .tile-small svg { width: 24px; height: 24px; fill: #888; }

  .row-wide-2 {
    display: flex;
    gap: 16px;
    width: 492px;
    height: 72px;
  }

  .tile-wide {
    width: 240px;
    height: 72px;
    background: #151515;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .tile-wide:active { background: #222; }

  .tile-medium {
    width: 110px;
    height: 72px;
    background: #151515;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .tile-medium:active { background: #222; }

  .row-4 {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    width: 492px;
    height: 72px;
  }

  .row-m-w-m {
    display: flex;
    gap: 16px;
    width: 492px;
    height: 72px;
  }

  .row-controls {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    width: 492px;
    height: 60px;
  }

  .brightness-panel {
    display: flex;
    align-items: center;
    padding: 10px;
    gap: 10px;
    width: 238px;
    height: 60px;
    background: #151515;
    border-radius: 8px;
    cursor: pointer;
  }

  .brightness-icon {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .brightness-icon svg { width: 24px; height: 24px; }

  .dot-grid {
    display: grid;
    grid-template-columns: repeat(20, 3px);
    grid-template-rows: repeat(5, 3px);
    gap: 6px;
    width: 176px;
    height: 39px;
    cursor: pointer;
  }

  .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #3A3A3A;
    transition: background 0.05s;
  }
  .dot.active { background: #DDDDDD; }

  .sound-panel {
    display: flex;
    align-items: center;
    padding: 10px;
    gap: 10px;
    width: 238px;
    height: 60px;
    background: #151515;
    border-radius: 8px;
    cursor: pointer;
  }

  .sound-icon {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sound-icon svg { width: 24px; height: 24px; }

  .sound-bars {
    display: flex;
    align-items: center;
    gap: 5px;
    width: 177px;
    height: 40px;
  }

  .sound-bar {
    width: 2px;
    height: 40px;
    border-radius: 2px;
    background: #151515;
  }
  .sound-bar.active { background: #DDDDDD; }

  .slider {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    position: absolute;
    height: 20px;
    left: 50%;
    transform: translateX(-50%);
    top: 572px;
  }
  .slider-icon { cursor: pointer; }

  .scroll-indicator {
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: absolute;
    width: 8px;
    right: 8px;
    top: 250px;
  }

  .scroll-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #505050;
  }
  .scroll-dot.active { background: #D9D9D9; }
</style>
</head>

<script>
  // Clock
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Swipe state machine: home → dock → settings
  // Swipe down reverses: settings → dock → home
  const bottomBar = document.getElementById('bottomBar');
  const settingsDrawer = document.getElementById('settingsDrawer');
  const deviceFrame = document.getElementById('deviceFrame');
  let state = 0; // 0 = home, 1 = dock visible, 2 = settings open

  let startY = 0;
  let currentY = 0;
  let swiping = false;

  deviceFrame.addEventListener('mousedown', onStart);
  deviceFrame.addEventListener('touchstart', onStart, { passive: false });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mouseup', onEnd);
  window.addEventListener('touchend', onEnd);

  function getY(e) {
    return e.touches ? e.touches[0].clientY : e.clientY;
  }

  function onStart(e) {
    if (e.target.closest('.dot-grid') || e.target.closest('.sound-bars')) return;
    if (e.target.closest('.content-scroll')) return;
    startY = getY(e);
    currentY = startY;
    swiping = true;
    bottomBar.style.transition = 'none';
    settingsDrawer.style.transition = 'none';
  }

  const DOCK_HEIGHT = 149;
  const DRAWER_HEIGHT = 620;
  const DOCK_THRESHOLD = 60;
  const DRAWER_THRESHOLD = 100;

  function onMove(e) {
    if (!swiping) return;
    currentY = getY(e);
    const dy = startY - currentY;

    if (state === 0 && dy > 0) {
      // Swiping up from home: dock slides in, then settings drawer continues
      if (dy <= DOCK_HEIGHT) {
        const progress = dy / DOCK_HEIGHT;
        bottomBar.style.transform = `translateY(${100 * (1 - progress)}%)`;
        settingsDrawer.style.transform = `translateY(100%)`;
      } else {
        bottomBar.style.transform = `translateY(0%)`;
        const drawerDy = dy - DOCK_HEIGHT;
        const progress = Math.min(drawerDy / DRAWER_HEIGHT, 1);
        settingsDrawer.style.transform = `translateY(${100 * (1 - progress)}%)`;
      }
    } else if (state === 1 && dy > 0) {
      const progress = Math.min(dy / DRAWER_HEIGHT, 1);
      settingsDrawer.style.transform = `translateY(${100 * (1 - progress)}%)`;
    } else if (state === 1 && dy < 0) {
      const progress = Math.min(Math.abs(dy) / DOCK_HEIGHT, 1);
      bottomBar.style.transform = `translateY(${100 * progress}%)`;
    } else if (state === 2 && dy < 0) {
      const progress = Math.min(Math.abs(dy) / DRAWER_HEIGHT, 1);
      settingsDrawer.style.transform = `translateY(${100 * progress}%)`;
    }
  }

  function onEnd() {
    if (!swiping) return;
    swiping = false;
    const dy = startY - currentY;
    const ease = '0.35s cubic-bezier(0.25, 1, 0.5, 1)';
    bottomBar.style.transition = `transform ${ease}`;
    settingsDrawer.style.transition = `transform ${ease}`;

    if (state === 0) {
      if (dy > DOCK_HEIGHT + DRAWER_THRESHOLD) {
        // Went past dock and far enough for settings
        state = 2;
        bottomBar.classList.add('visible');
        bottomBar.style.transform = '';
        settingsDrawer.classList.add('visible');
        settingsDrawer.style.transform = '';
      } else if (dy > DOCK_THRESHOLD) {
        // Just enough for dock
        state = 1;
        bottomBar.classList.add('visible');
        bottomBar.style.transform = '';
        settingsDrawer.style.transform = '';
      } else {
        // Snap back
        bottomBar.style.transform = '';
        settingsDrawer.style.transform = '';
      }
    } else if (state === 1) {
      if (dy > DRAWER_THRESHOLD) {
        state = 2;
        settingsDrawer.classList.add('visible');
        settingsDrawer.style.transform = '';
      } else if (dy < -DOCK_THRESHOLD) {
        state = 0;
        bottomBar.classList.remove('visible');
        bottomBar.style.transform = '';
      } else {
        settingsDrawer.style.transform = '';
        bottomBar.style.transform = '';
      }
    } else if (state === 2) {
      if (dy < -DRAWER_THRESHOLD) {
        state = 1;
        settingsDrawer.classList.remove('visible');
        settingsDrawer.style.transform = '';
      } else {
        settingsDrawer.style.transform = '';
      }
    }
  }

  // Scroll indicator
  const contentScroll = document.getElementById('contentScroll');
  const scrollDots = document.querySelectorAll('.scroll-dot');

  contentScroll.addEventListener('scroll', () => {
    const scrollTop = contentScroll.scrollTop;
    const pageHeight = contentScroll.clientHeight;
    const currentPage = Math.round(scrollTop / pageHeight);
    scrollDots.forEach((dot, i) => {
      dot.classList.toggle('active', i === currentPage);
    });
  });

  // Prevent content scroll area from triggering swipe gestures
  contentScroll.addEventListener('mousedown', (e) => e.stopPropagation());
  contentScroll.addEventListener('touchstart', (e) => e.stopPropagation());

  // Brightness dot grid
  const dotGrid = document.getElementById('dotGrid');
  const COLS = 20, ROWS = 5;
  let brightnessCol = 10;
  let dots = [];

  function buildDotGrid() {
    dotGrid.innerHTML = '';
    dots = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        dotGrid.appendChild(dot);
        dots.push({ el: dot, col: c });
      }
    }
    updateDotGrid();
  }

  function updateDotGrid() {
    dots.forEach(({ el, col }) => el.classList.toggle('active', col < brightnessCol));
  }

  function setBrightnessFromX(clientX) {
    const rect = dotGrid.getBoundingClientRect();
    brightnessCol = Math.max(0, Math.min(COLS, Math.round(((clientX - rect.left) / rect.width) * COLS)));
    updateDotGrid();
  }

  let draggingBrightness = false;
  dotGrid.addEventListener('mousedown', (e) => { draggingBrightness = true; setBrightnessFromX(e.clientX); });
  dotGrid.addEventListener('touchstart', (e) => { draggingBrightness = true; setBrightnessFromX(e.touches[0].clientX); }, { passive: true });
  window.addEventListener('mousemove', (e) => { if (draggingBrightness) setBrightnessFromX(e.clientX); });
  window.addEventListener('touchmove', (e) => { if (draggingBrightness) setBrightnessFromX(e.touches[0].clientX); }, { passive: true });
  window.addEventListener('mouseup', () => draggingBrightness = false);
  window.addEventListener('touchend', () => draggingBrightness = false);

  // Sound bars
  const soundBarsEl = document.getElementById('soundBars');
  const TOTAL_BARS = 26;
  let soundLevel = 12;
  let bars = [];

  function buildSoundBars() {
    soundBarsEl.innerHTML = '';
    bars = [];
    for (let i = 0; i < TOTAL_BARS; i++) {
      const bar = document.createElement('div');
      bar.className = 'sound-bar';
      soundBarsEl.appendChild(bar);
      bars.push(bar);
    }
    updateSoundBars();
  }

  function updateSoundBars() {
    bars.forEach((bar, i) => bar.classList.toggle('active', i < soundLevel));
  }

  function setSoundFromX(clientX) {
    const rect = soundBarsEl.getBoundingClientRect();
    soundLevel = Math.max(0, Math.min(TOTAL_BARS, Math.round(((clientX - rect.left) / rect.width) * TOTAL_BARS)));
    updateSoundBars();
  }

  let draggingSound = false;
  soundBarsEl.addEventListener('mousedown', (e) => { draggingSound = true; setSoundFromX(e.clientX); });
  soundBarsEl.addEventListener('touchstart', (e) => { draggingSound = true; setSoundFromX(e.touches[0].clientX); }, { passive: true });
  window.addEventListener('mousemove', (e) => { if (draggingSound) setSoundFromX(e.clientX); });
  window.addEventListener('touchmove', (e) => { if (draggingSound) setSoundFromX(e.touches[0].clientX); }, { passive: true });
  window.addEventListener('mouseup', () => draggingSound = false);
  window.addEventListener('touchend', () => draggingSound = false);

  buildDotGrid();
  buildSoundBars();
</script>

</body>
</html>
