<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Settings Drawer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Sora', sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  .device-frame {
    position: relative;
    width: 540px;
    height: 620px;
    overflow: hidden;
    background: #000;
  }

  .home-screen {
    position: absolute;
    inset: 0;
    z-index: 1;
  }
  .home-screen img { width: 100%; height: 100%; object-fit: cover; }

  /* Swipe zone at bottom of home */
  .swipe-zone {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 80px;
    z-index: 5;
    touch-action: none;
  }

  /* Dock — app icons, slides up first */
  .dock {
    position: absolute;
    bottom: 0; left: 0;
    width: 540px; height: 149px;
    z-index: 4;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.25s ease;
    touch-action: none;
  }
  .dock svg { display: block; }
  .dock.visible { transform: translateY(0); }
  .dock.fade { opacity: 0; pointer-events: none; }

  /* Nav bar — shape icons, fixed bottom bar for settings */
  .nav-bar {
    position: absolute;
    bottom: 0; left: 0;
    width: 540px; height: 80px;
    background: #000;
    z-index: 4;
    display: flex;
    justify-content: center;
    align-items: center;
    transform: translateY(0);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    touch-action: none;
  }
  .nav-bar.visible { opacity: 1; pointer-events: auto; }

  /* Settings panel — slides up behind the nav bar */
  .settings-panel {
    position: absolute;
    top: 0; left: 0; right: 0;
    bottom: 80px;
    z-index: 3;
    background: #000;
    transform: translateY(620px);
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .settings-panel.visible { transform: translateY(0); }

  /* Dismiss handle at top of settings */
  .dismiss-handle {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 56px;
    z-index: 6;
    touch-action: none;
    cursor: grab;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: absolute;
    width: 500px; height: 32px;
    left: calc(50% - 250px);
    top: 24px;
    pointer-events: none;
  }

  .time {
    font-family: 'Sora', sans-serif;
    font-weight: 400;
    font-size: 20px;
    line-height: 130%;
    color: #D2D2D2;
  }

  .settings-icon {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: auto; cursor: pointer;
  }
  .settings-icon svg { width: 22px; height: 22px; fill: #D2D2D2; }

  .content-scroll {
    position: absolute;
    top: 76px; left: 30px;
    width: 480px; bottom: 0;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }
  .content-scroll::-webkit-scrollbar { display: none; }

  .content-page {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 20px;
    width: 480px;
    padding-bottom: 20px;
  }

  .row-small { display: flex; justify-content: space-between; gap: 16px; width: 480px; height: 52px; }
  .tile-small {
    width: 68px; height: 52px; background: #151515; border-radius: 8px;
    cursor: pointer; transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .tile-small:active { background: #222; }
  .tile-small svg { width: 24px; height: 24px; fill: #888; }

  .row-wide-2 { display: flex; gap: 16px; width: 480px; height: 72px; }
  .tile-wide { width: 240px; height: 72px; background: #151515; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
  .tile-wide:active { background: #222; }
  .tile-medium { width: 110px; height: 72px; background: #151515; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
  .tile-medium:active { background: #222; }
  .row-4 { display: flex; justify-content: space-between; gap: 16px; width: 480px; height: 72px; }
  .row-m-w-m { display: flex; gap: 16px; width: 480px; height: 72px; }
  .row-controls { display: flex; justify-content: space-between; gap: 14px; width: 480px; height: 56px; }

  .brightness-panel {
    display: flex; align-items: center; padding: 10px; gap: 10px;
    width: 233px; height: 56px; background: #151515; border-radius: 8px;
  }
  .brightness-icon { width: 32px; height: 32px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .brightness-icon svg { width: 24px; height: 24px; }

  .dot-grid {
    display: grid; grid-template-columns: repeat(19, 3px); grid-template-rows: repeat(4, 3px);
    gap: 6px; cursor: pointer; touch-action: none;
  }
  .dot { width: 3px; height: 3px; border-radius: 50%; background: #3A3A3A; transition: background 0.05s; }
  .dot.active { background: #DDDDDD; }

  .sound-panel {
    display: flex; align-items: center; padding: 10px; gap: 10px;
    width: 233px; height: 56px; background: #151515; border-radius: 8px;
  }
  .sound-icon { width: 32px; height: 32px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .sound-icon svg { width: 24px; height: 24px; }
  .sound-bars { display: flex; align-items: center; gap: 5px; height: 28px; touch-action: none; }
  .sound-bar { width: 2px; height: 28px; border-radius: 1px; background: #3A3A3A; }
  .sound-bar.active { background: #0087FF; }

  .scroll-indicator {
    display: flex; flex-direction: column; gap: 20px;
    position: absolute; width: 8px; right: 8px; top: 50%;
    transform: translateY(-50%);
  }
  .scroll-dot { width: 8px; height: 8px; border-radius: 50%; background: #505050; }
  .scroll-dot.active { background: #D9D9D9; }

  .wifi-overlay {
    display: none; position: absolute; inset: 0; z-index: 50;
    background: rgba(0,0,0,0.55);
  }
  .wifi-overlay.open { display: block; }
  .wifi-panel {
    position: absolute; width: 480px; height: 440px;
    left: 30px; top: 80px;
    background: #151515; border-radius: 8px;
    font-family: 'Sora', sans-serif;
  }
  .wifi-panel-title {
    position: absolute; left: 16px; top: 20px;
    font-size: 20px; font-weight: 400; color: #A4A4A4;
  }
  .wifi-panel-toggle {
    position: absolute; left: 366px; top: 16px;
    width: 50px; height: 28px;
    background: #353535; border-radius: 14px;
    display: flex; align-items: center;
    padding: 3px; cursor: pointer;
  }
  .wifi-panel-toggle.on { justify-content: flex-end; }
  .wifi-panel-toggle .knob {
    width: 22px; height: 22px; border-radius: 11px;
    background: #008AFF;
  }
  .wifi-panel-gear {
    position: absolute; width: 32px; height: 32px;
    right: 16px; top: 14px; color: #9E9E9E;
  }
  .wifi-panel-divider {
    position: absolute; left: 0; width: 480px; height: 0;
    border-top: 1px solid #212121;
  }
  .wifi-panel-row {
    position: absolute; left: 16px;
    display: flex; align-items: center; gap: 8px; height: 28px;
  }
  .wifi-panel-row svg { width: 28px; height: 28px; flex-shrink: 0; }
  .wifi-panel-row .wname {
    font-size: 20px; font-weight: 400; color: #A4A4A4;
  }
  .wifi-panel-row.connected svg { color: #008AFF; }
  .wifi-panel-row.connected .wname { color: #808080; }
  .wifi-panel-row:not(.connected) svg { color: #9E9E9E; }
  .wifi-panel-connected-label {
    position: absolute; right: 16px; top: 81px;
    font-size: 18px; font-weight: 300; color: #717171;
    font-family: 'Sora', sans-serif;
  }
</style>
</head>

<script>
  // Clock
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Elements
  const dock = document.getElementById('dock');
  const navBar = document.getElementById('navBar');
  const panel = document.getElementById('settingsPanel');
  const swipeZone = document.getElementById('swipeZone');
  const dismissHandle = document.getElementById('dismissHandle');
  let state = 0; // 0=home, 1=dock visible, 2=settings open

  function enterState(s) {
    state = s;
    if (s === 0) {
      dock.classList.remove('visible', 'fade');
      dock.style.transform = '';
      navBar.classList.remove('visible');
      panel.classList.remove('visible'); panel.style.transform = '';
      swipeZone.style.pointerEvents = '';
    } else if (s === 1) {
      dock.classList.add('visible'); dock.classList.remove('fade');
      dock.style.transform = '';
      navBar.classList.remove('visible');
      panel.classList.remove('visible'); panel.style.transform = '';
      swipeZone.style.pointerEvents = '';
    } else if (s === 2) {
      dock.classList.add('visible', 'fade');
      navBar.classList.add('visible');
      panel.classList.add('visible'); panel.style.transform = '';
      swipeZone.style.pointerEvents = 'none';
    }
  }

  function makeSwipeable(el, { onSwipe }) {
    let startY = 0, dy = 0, active = false;
    el.addEventListener('pointerdown', (e) => {
      active = true; startY = e.clientY; dy = 0;
      el.setPointerCapture(e.pointerId);
      dock.style.transition = 'none';
      panel.style.transition = 'none';
    });
    el.addEventListener('pointermove', (e) => {
      if (!active) return;
      dy = startY - e.clientY;
      const result = onSwipe('move', dy, e);
      if (result === 'cancel') active = false;
    });
    const end = () => {
      if (!active) return;
      active = false;
      const ease = '0.35s cubic-bezier(0.25, 1, 0.5, 1)';
      dock.style.transition = '';
      panel.style.transition = `transform ${ease}`;
      onSwipe('end', dy);
    };
    el.addEventListener('pointerup', end);
    el.addEventListener('pointercancel', () => { active = false; end(); });
  }

  // Check if pointer is over the settings icon in the dock
  function isOverSettingsIcon(e) {
    const rect = dock.getBoundingClientRect();
    const svgX = ((e.clientX - rect.left) / rect.width) * 540;
    const svgY = ((e.clientY - rect.top) / rect.height) * 149;
    return svgX >= 420 && svgX <= 497 && svgY >= 60 && svgY <= 138;
  }

  // Swipe up from bottom
  let swipeStartX = 0;
  const origMakeSwipeable = makeSwipeable;

  makeSwipeable(swipeZone, {
    onSwipe(phase, dy, e) {
      if (state === 0) {
        if (phase === 'move' && dy > 0) {
          if (dy <= 80) {
            dock.style.transform = `translateY(${100 * (1 - dy / 80)}%)`;
          } else {
            dock.style.transform = 'translateY(0)';
            const p = Math.min((dy - 80) / 540, 1);
            panel.style.transform = `translateY(${620 * (1 - p)}px)`;
          }
          // If dock is visible and pointer is over settings icon, open settings
          if (dy >= 40 && e && isOverSettingsIcon(e)) {
            dock.style.transition = '';
            panel.style.transition = '';
            enterState(2);
            return 'cancel';
          }
        }
        if (phase === 'end') {
          if (dy > 180) {
            enterState(2);
          } else if (dy > 40) {
            enterState(1);
          } else {
            dock.style.transform = ''; panel.style.transform = '';
          }
        }
      } else if (state === 1) {
        if (phase === 'move' && dy > 0) {
          const p = Math.min(dy / 540, 1);
          panel.style.transform = `translateY(${620 * (1 - p)}px)`;
        }
        if (phase === 'move' && dy < 0) {
          const p = Math.min(Math.abs(dy) / 80, 1);
          dock.style.transform = `translateY(${100 * p}%)`;
        }
        if (phase === 'end') {
          if (dy > 80) {
            enterState(2);
          } else if (dy < -40) {
            enterState(0);
          } else {
            panel.style.transform = ''; dock.style.transform = '';
          }
        }
      }
    }
  });

  // Swipe up from dock to reveal settings, or tap settings icon
  let dockStartEvent = null;
  makeSwipeable(dock, {
    onSwipe(phase, dy, e) {
      if (phase === 'move' && Math.abs(dy) < 5 && e) dockStartEvent = e;
      if (state === 1) {
        if (phase === 'move' && dy > 0) {
          const p = Math.min(dy / 540, 1);
          panel.style.transform = `translateY(${620 * (1 - p)}px)`;
        }
        if (phase === 'move' && dy < 0) {
          const p = Math.min(Math.abs(dy) / 80, 1);
          dock.style.transform = `translateY(${100 * p}%)`;
        }
        if (phase === 'end') {
          if (dy > 80) {
            enterState(2);
          } else if (dy < -40) {
            enterState(0);
          } else if (Math.abs(dy) < 10 && dockStartEvent) {
            // Tap — check if on settings icon
            const rect = dock.getBoundingClientRect();
            const svgX = ((dockStartEvent.clientX - rect.left) / rect.width) * 540;
            if (svgX >= 420 && svgX <= 497) {
              enterState(2);
            } else {
              panel.style.transform = ''; dock.style.transform = '';
            }
          } else {
            panel.style.transform = ''; dock.style.transform = '';
          }
          dockStartEvent = null;
        }
      }
    }
  });

  // Swipe down from top to dismiss settings
  makeSwipeable(dismissHandle, {
    onSwipe(phase, dy) {
      if (state !== 2) return;
      if (phase === 'move' && dy < 0) {
        const p = Math.min(Math.abs(dy) / 540, 1);
        panel.style.transform = `translateY(${620 * p}px)`;
      }
      if (phase === 'end') {
        if (dy < -80) {
          enterState(1);
        } else {
          panel.style.transform = '';
        }
      }
    }
  });

  // Settings icon in dock — tap to open settings
  const settingsIcon = dock.querySelector('.settings-dock-icon');
  const settingsIconGroup = settingsIcon.parentElement;
  // Get all elements in the settings icon area (rect + paths + circles after it)
  let settingsEls = [];
  let found = false;
  for (const el of settingsIconGroup.children) {
    if (el === settingsIcon) found = true;
    if (found) settingsEls.push(el);
  }

  dock.addEventListener('click', (e) => {
    if (state !== 1) return;
    // Check if click is on the settings icon area (right side of dock)
    const rect = dock.getBoundingClientRect();
    const x = e.clientX - rect.left;
    // Settings icon is at x=426.6, width=64 in the 540-wide SVG
    const svgX = (x / rect.width) * 540;
    if (svgX >= 420 && svgX <= 497) {
      enterState(2);
    }
  });

  // Drag-to-scroll for content
  const contentScroll = document.getElementById('contentScroll');
  let cDrag = false, cStartY = 0, cScrollTop = 0;
  contentScroll.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.dot-grid') || e.target.closest('.sound-bars') || e.target.closest('#wifiTile') || e.target.closest('#btTile')) return;
    cDrag = true; cStartY = e.clientY; cScrollTop = contentScroll.scrollTop;
    contentScroll.setPointerCapture(e.pointerId);
  });
  contentScroll.addEventListener('pointermove', (e) => {
    if (!cDrag) return;
    contentScroll.scrollTop = cScrollTop - (e.clientY - cStartY);
  });
  contentScroll.addEventListener('pointerup', () => cDrag = false);
  contentScroll.addEventListener('pointercancel', () => cDrag = false);

  // Scroll indicator
  const scrollDots = document.querySelectorAll('.scroll-dot');
  contentScroll.addEventListener('scroll', () => {
    const max = contentScroll.scrollHeight - contentScroll.clientHeight;
    if (max <= 0) return;
    const page = Math.round((contentScroll.scrollTop / max) * (scrollDots.length - 1));
    scrollDots.forEach((dot, i) => dot.classList.toggle('active', i === page));
  });

  // Brightness
  const dotGrid = document.getElementById('dotGrid');
  const COLS = 19, ROWS = 4;
  let brightnessCol = 5, dots = [];
  function buildDotGrid() {
    dotGrid.innerHTML = ''; dots = [];
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++) {
        const d = document.createElement('div');
        d.className = 'dot'; dotGrid.appendChild(d);
        dots.push({ el: d, col: c });
      }
    updateDots();
  }
  function updateDots() { dots.forEach(({ el, col }) => el.classList.toggle('active', col < brightnessCol)); }
  function setBrightness(x) {
    const r = dotGrid.getBoundingClientRect();
    brightnessCol = Math.max(0, Math.min(COLS, Math.round(((x - r.left) / r.width) * COLS)));
    updateDots();
  }
  let dragB = false;
  dotGrid.addEventListener('pointerdown', (e) => { dragB = true; dotGrid.setPointerCapture(e.pointerId); setBrightness(e.clientX); });
  dotGrid.addEventListener('pointermove', (e) => { if (dragB) setBrightness(e.clientX); });
  dotGrid.addEventListener('pointerup', () => dragB = false);

  // Sound
  const soundBarsEl = document.getElementById('soundBars');
  const TOTAL_BARS = 24;
  let soundLevel = 12, bars = [];
  function buildSoundBars() {
    soundBarsEl.innerHTML = ''; bars = [];
    for (let i = 0; i < TOTAL_BARS; i++) {
      const b = document.createElement('div');
      b.className = 'sound-bar'; soundBarsEl.appendChild(b); bars.push(b);
    }
    updateBars();
  }
  function updateBars() { bars.forEach((b, i) => b.classList.toggle('active', i < soundLevel)); }
  function setSound(x) {
    const r = soundBarsEl.getBoundingClientRect();
    soundLevel = Math.max(0, Math.min(TOTAL_BARS, Math.round(((x - r.left) / r.width) * TOTAL_BARS)));
    updateBars();
  }
  let dragS = false;
  soundBarsEl.addEventListener('pointerdown', (e) => { dragS = true; soundBarsEl.setPointerCapture(e.pointerId); setSound(e.clientX); });
  soundBarsEl.addEventListener('pointermove', (e) => { if (dragS) setSound(e.clientX); });
  soundBarsEl.addEventListener('pointerup', () => dragS = false);

  buildDotGrid();
  buildSoundBars();

  // WiFi & Bluetooth tile toggles
  const contentSvg = document.querySelector('.content-page svg');
  const wifiTile = contentSvg.querySelector('#wifiTile');
  const btTile = contentSvg.querySelector('#btTile');
  let wifiOn = true, btOn = true;

  // Long-press vs tap for WiFi tile
  const wifiOverlay = document.getElementById('wifiOverlay');
  const wifiPanel = document.getElementById('wifiPanel');
  let wifiLpTimer = null, wifiDidLongPress = false;

  function toggleWifi() {
    wifiOn = !wifiOn;
    const color = wifiOn ? '#0087FF' : '#464646';
    wifiTile.querySelectorAll('.wifi-icon').forEach(p => p.setAttribute('fill', color));
    wifiTile.querySelector('.wifi-text-on').setAttribute('display', wifiOn ? 'inline' : 'none');
    wifiTile.querySelector('.wifi-text-off').setAttribute('display', wifiOn ? 'none' : 'inline');
  }

  const settingsInner = settingsPanel.querySelectorAll('.dismiss-handle, .top-bar, .content-scroll, .scroll-indicator');
  function openWifiPanel() {
    wifiOverlay.classList.add('open');
    settingsInner.forEach(el => el.style.display = 'none');
  }
  function closeWifiPanel() {
    wifiOverlay.classList.remove('open');
    settingsInner.forEach(el => el.style.display = '');
  }

  wifiTile.addEventListener('pointerdown', function(e) {
    wifiDidLongPress = false;
    wifiLpTimer = setTimeout(() => { wifiDidLongPress = true; openWifiPanel(); }, 400);
  });
  wifiTile.addEventListener('pointerup', function(e) {
    clearTimeout(wifiLpTimer);
    if (!wifiDidLongPress) { e.stopPropagation(); toggleWifi(); }
  });
  wifiTile.addEventListener('pointercancel', () => clearTimeout(wifiLpTimer));
  wifiTile.addEventListener('pointermove', (e) => {
    if (Math.abs(e.movementX) > 5 || Math.abs(e.movementY) > 5) clearTimeout(wifiLpTimer);
  });

  wifiOverlay.addEventListener('click', function(e) {
    if (!wifiPanel.contains(e.target)) closeWifiPanel();
  });

  btTile.addEventListener('click', function(e) {
    e.stopPropagation();
    btOn = !btOn;
    const color = btOn ? '#0087FF' : '#464646';
    btTile.querySelectorAll('.bt-icon').forEach(p => p.setAttribute('fill', color));
    btTile.querySelector('.bt-text-on').setAttribute('display', btOn ? 'inline' : 'none');
    btTile.querySelector('.bt-text-off').setAttribute('display', btOn ? 'none' : 'inline');
  });
</script>
